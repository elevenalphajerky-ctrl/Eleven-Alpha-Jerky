<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eleven Alpha Jerky</title>
  <meta name="description" content="Eleven Alpha Jerky is veteran-owned small batch jerky built through family, tradition, and years of refinement." />

  <style>
    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      background: #050505;
    }

    body {
      margin: 0;
      background: #050505;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
    }

    .site {
      position: relative;
      max-width: 1400px;
      margin: 0 auto;
      background: #050505;
      box-shadow: 0 0 80px rgba(0,0,0,.8);
    }

    .mockup {
      width: 100%;
      height: auto;
      display: block;
    }

    .click-zone {
      position: absolute;
      display: block;
      z-index: 20;
      background: transparent;
    }

    .click-zone:hover {
      background: rgba(181,133,60,.08);
    }

    /* Click zones scaled to the embedded mockup */
    .home-link { left: 2%; top: 2%; width: 7%; height: 5%; }
    .story-link { left: 9.5%; top: 2%; width: 10%; height: 5%; }
    .flavors-link { left: 20%; top: 2%; width: 10%; height: 5%; }
    .shop-link { left: 30%; top: 2%; width: 8%; height: 5%; }
    .contact-link { left: 76%; top: 2%; width: 10%; height: 5%; }

    .view-flavors-link { left: 4.8%; top: 34.7%; width: 15.5%; height: 4.8%; }
    .order-now-link { left: 21.0%; top: 34.7%; width: 15.5%; height: 4.8%; }

    .anchor {
      height: 1px;
    }

    .contact {
      background: #050505;
      border-top: 2px solid rgba(181,133,60,.75);
      padding: 70px 22px 76px;
      text-align: center;
    }

    .contact-inner {
      max-width: 900px;
      margin: 0 auto;
      border: 2px solid rgba(181,133,60,.72);
      padding: 44px 24px;
      background: radial-gradient(circle at center, rgba(181,133,60,.11), transparent 38%), #080808;
    }

    .eyebrow {
      color: #b5853c;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .28em;
      font-size: 13px;
      margin-bottom: 14px;
    }

    h2 {
      margin: 0;
      font-size: clamp(34px, 6vw, 58px);
      line-height: .95;
      text-transform: uppercase;
      font-weight: 1000;
      letter-spacing: -.03em;
    }

    .accent {
      width: 70px;
      height: 3px;
      background: #b5853c;
      margin: 24px auto;
    }

    p {
      max-width: 690px;
      margin: 0 auto;
      color: #dddddd;
      line-height: 1.7;
      font-size: 17px;
    }

    .button {
      display: inline-flex;
      margin-top: 28px;
      background: #b5853c;
      color: #050505;
      padding: 14px 24px;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: .08em;
      text-decoration: none;
    }

    .button:hover {
      background: #d9a854;
    }

    .email {
      margin-top: 22px;
      color: #b5853c;
      font-size: 18px;
      font-weight: 900;
    }

    footer {
      border-top: 1px solid rgba(181,133,60,.45);
      padding: 24px 18px;
      text-align: center;
      color: #999999;
      font-size: 13px;
      background: #030303;
    }

    @media (max-width: 700px) {
      .contact {
        padding: 46px 16px 54px;
      }

      .contact-inner {
        padding: 34px 18px;
      }
    }
  </style>
</head>
