<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Eleven Alpha Jerky</title>
  <meta name="description" content="Eleven Alpha Jerky is veteran-owned small batch jerky built through family, tradition, and years of refinement." />

  <style>
    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      background: #050505;
    }

    body {
      margin: 0;
      background: #050505;
      color: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
    }

    .site {
      max-width: 1400px;
      margin: 0 auto;
      background: #050505;
      box-shadow: 0 0 80px rgba(0,0,0,.75);
    }

    .section-image {
      display: block;
      width: 100%;
      height: auto;
    }

    .contact {
      background: #050505;
      border-top: 1px solid rgba(181,133,60,.65);
      padding: 64px 22px 72px;
      text-align: center;
    }

    .contact-inner {
      max-width: 900px;
      margin: 0 auto;
      border: 2px solid rgba(181,133,60,.72);
      padding: 44px 24px;
      background: radial-gradient(circle at center, rgba(181,133,60,.11), transparent 38%), #080808;
    }

    .eyebrow {
      color: #b5853c;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .28em;
      font-size: 13px;
      margin-bottom: 14px;
    }

    h2 {
      margin: 0;
      font-size: clamp(34px, 6vw, 58px);
      line-height: .95;
      text-transform: uppercase;
      font-weight: 1000;
      letter-spacing: -.03em;
    }

    .accent {
      width: 70px;
      height: 3px;
      background: #b5853c;
      margin: 24px auto;
    }

    p {
      max-width: 680px;
      margin: 0 auto;
      color: #dddddd;
      line-height: 1.7;
      font-size: 17px;
    }

    .button {
      display: inline-flex;
      margin-top: 28px;
      background: #b5853c;
      color: #050505;
      padding: 14px 24px;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: .08em;
      text-decoration: none;
    }

    .button:hover {
      background: #d9a854;
    }

    .email {
      margin-top: 22px;
      color: #b5853c;
      font-size: 18px;
      font-weight: 900;
    }

    footer {
      border-top: 1px solid rgba(181,133,60,.45);
      padding: 24px 18px;
      text-align: center;
      color: #999999;
      font-size: 13px;
      background: #030303;
    }

    @media (max-width: 700px) {
      .contact {
        padding: 46px 16px 54px;
      }

      .contact-inner {
        padding: 34px 18px;
      }
    }
  </style>
</head>
